version: "2"
sql:
  - schema: "migrations"
    queries: "internal/data/query"
    engine: "mysql"
    gen:
      go:
        package: "sqlc"
        out: "internal/data/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
