syntax = "proto3";

package user.v1;

option go_package = "github.com/CBookShu/kd48/api/proto/user/v1;userv1";

// 用户服务定义
service UserService {
  // 模拟登录获取凭证
  rpc Login (LoginRequest) returns (LoginReply) {}
  // 注册并签发会话（注册即登录，与 Login 同等 Redis Session）
  rpc Register (RegisterRequest) returns (RegisterReply) {}
  // 验证 Token 并返回用户信息
  rpc VerifyToken (VerifyTokenRequest) returns (VerifyTokenReply) {}
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginReply {
  bool success = 1;
  string token = 2; // 模拟返回的 token
  uint64 user_id = 3; // 新增：用户ID，网关需要用于顶号映射
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message RegisterReply {
  bool success = 1;
  string token = 2;
  uint64 user_id = 3; // 新增：用户ID
}

message VerifyTokenRequest {
  string token = 1; // Token to validate (from client localStorage)
}

message VerifyTokenData {
  uint64 user_id = 1;
  string username = 2;
}

message VerifyTokenReply {
  bool success = 1;
  VerifyTokenData data = 2;
}
