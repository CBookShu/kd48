syntax = "proto3";

package user.v1;

option go_package = "github.com/CBookShu/kd48/api/proto/user/v1;userv1";

// 用户服务定义
service UserService {
  // 模拟登录获取凭证
  rpc Login (LoginRequest) returns (LoginReply) {}
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginReply {
  bool success = 1;
  string token = 2; // 模拟返回的 token
}
