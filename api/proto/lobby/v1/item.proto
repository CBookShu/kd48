syntax = "proto3";

package lobby.v1;

option go_package = "github.com/CBookShu/kd48/api/proto/lobby/v1;lobbyv1";

// ItemService 物品服务
service ItemService {
  rpc GetMyItems(GetMyItemsRequest) returns (MyItemsData);
}

message GetMyItemsRequest {}

message MyItemsData {
  map<int32, int64> items = 1;  // item_id -> count
}
