server:
  name: "kd48"
  env: "dev"

gateway:
  port: 8080
  meta_service_types_prefix: "kd48/meta/service-types/"
  meta_gateway_routes_prefix: "kd48/meta/gateway-routes/"

user_service:
  port: 9000
  # 服务注册到 etcd 的广播地址（同 lobby_service 配置说明）
  advertise_addr: ""

lobby_service:
  port: 9001
  # 服务注册到 etcd 的广播地址
  # - 开发环境 (env: dev)：可留空，自动使用 localhost
  # - 生产环境：必须配置，否则服务启动失败
  # 
  # K8s 环境示例：
  #   advertise_addr: "${POD_IP}"
  # Docker Compose 环境示例：
  #   advertise_addr: "lobby-service"  # 使用服务名
  # 物理机环境示例：
  #   advertise_addr: "192.168.1.100"
  advertise_addr: ""

log:
  level: "debug" # debug, info, warn, error
  file_path: "./logs" 

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

etcd:
  endpoints:
    - "localhost:2379"

mysql:
  # 本地开发 DSN，开启 parseTime 是为了让 sqlc 生成的代码能正确处理 time.Time
  dsn: "root:root@tcp(localhost:3306)/kd48?parseTime=true&loc=Local"

session:
  # Token 过期时间（小时）
  expire_hours: 168 # 7天
