name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Build
        run: |
          go build ./gateway/...
          go build ./services/user/...
          go build ./pkg/...
      
      - name: Test
        run: |
          go test ./gateway/... -v -timeout 10m
          go test ./services/user/... -v -timeout 10m
          go test ./pkg/... -v -timeout 10m
