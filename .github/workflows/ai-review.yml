name: AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.AI_API_KEY }}" ]; then
            echo "Error: AI_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.AI_API_URL }}" ]; then
            echo "Error: AI_API_URL secret is not configured"
            exit 1
          fi
      - uses: presubmit/ai-reviewer@c8604503f68ef36ac0fcfec558140a149ab1b225
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.AI_API_KEY }}
          LLM_MODEL: ${{ secrets.AI_MODEL }}
          LLM_PROVIDER: "ai-sdk"
          LLM_BASE_URL: ${{ secrets.AI_API_URL }}
