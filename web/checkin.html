<!-- web/checkin.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>签到 - kd48</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/">首页</a>
    <a href="/checkin.html">签到</a>
    <a href="/items.html">背包</a>
    <a href="#" onclick="logout()">退出</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>每日签到</h2>
      <div id="status">加载中...</div>
    </div>

    <div class="card">
      <div id="days"></div>
    </div>

    <div class="card">
      <button id="checkinBtn" class="btn" onclick="doCheckin()">立即签到</button>
    </div>

    <div class="card" id="result"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/checkin.js"></script>
  <script>
    async function init() {
      const client = getWsClient();
      const token = client.getToken();

      if (!token) {
        document.getElementById('status').innerHTML = '<p>请先 <a href="/">登录</a></p>';
        return;
      }

      try {
        await initClient();
        await loadStatus();
      } catch (err) {
        console.error('初始化失败:', err);
        if (err.message.includes('未认证') || err.message.includes('token')) {
          client.clearToken();
          document.getElementById('status').innerHTML = '<p>登录已过期，请 <a href="/">重新登录</a></p>';
        } else {
          document.getElementById('status').textContent = '连接失败: ' + err.message;
        }
      }
    }

    init();
  </script>
</body>
</html>
